name: Build API Debug Helper APK

on:
  workflow_dispatch:

jobs:
  build_apk:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Generate signing keystore
        run: |
          keytool -genkey -v \
            -keystore debug-helper.keystore \
            -alias debughelper \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Debug Helper, OU=Dev, O=Bugroom, L=Local, S=State, C=CN" \
            -storepass debughelper123 \
            -keypass debughelper123

      - name: Build signed release APK
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/debug-helper.keystore
          SIGNING_STORE_PASSWORD: debughelper123
          SIGNING_KEY_ALIAS: debughelper
          SIGNING_KEY_PASSWORD: debughelper123
        run: ./gradlew :app:assembleRelease

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: api-debug-helper-release
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: API Debug Helper - Latest Build
          body: |
            调试助手 APK 自动构建版本
            
            **用途**: 测试 Google AI Edge Gallery 本地 API 服务
            **目标项目**: https://github.com/bugroom/google-ai-edge-gallery-local-api
            **构建时间**: ${{ github.event.head_commit.timestamp }}
            
            ### 功能特性
            - 测试 /health 健康检查
            - 获取 /v1/models 模型列表
            - 发送 /v1/chat/completions 聊天请求
            - 支持流式和非流式响应
            - 应用内日志查看
            
            ### 安装
            1. 下载 `app-release.apk`（已签名版本）
            2. 在 Android 设备上安装
            3. 配置 Gallery API 服务地址即可测试
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
